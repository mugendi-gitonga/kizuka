<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bad Request - Kizuka</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.0/dist/full.min.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100">
    <div class="min-h-screen flex items-center justify-center px-4 py-12">
        <div class="max-w-md md:max-w-lg lg:max-w-2xl w-full">
            <div class="bg-white rounded-lg shadow-lg px-4 py-8 border border-slate-200 text-center">
                <!-- Error Icon -->
                <div class="mb-6">
                    <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-exclamation-triangle text-red-600 text-3xl"></i>
                    </div>
                    <h1 class="text-4xl font-bold text-slate-900 mb-2">400</h1>
                    <p class="text-xl font-semibold text-slate-700">Bad Request</p>
                </div>

                <!-- Error Message -->
                <div class="mb-8">
                    <p class="text-slate-600 text-sm leading-relaxed">
                        The request could not be understood by the server. Please check your input and try again.
                    </p>
                </div>

                <!-- Error Details Box -->
                <div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-8">
                    <p class="text-xs text-red-700 text-center">
                        <strong>Error Code:</strong> 400 | Bad Request
                    </p>
                </div>

                <!-- Action Buttons -->
                <div class="space-y-3">
                    <a href="/" class="btn btn-block bg-blue-600 hover:bg-blue-700 border-0 text-white font-semibold">
                        <i class="fas fa-home"></i> Go to Dashboard
                    </a>
                    <a href="javascript:history.back()" class="btn btn-block btn-outline border-slate-300 hover:bg-slate-100 text-slate-700">
                        <i class="fas fa-arrow-left"></i> Go Back
                    </a>
                </div>

                <!-- Help Section -->
                <div class="mt-8 pt-8 border-t border-slate-200">
                    <p class="text-xs text-slate-600 mb-3">Need help?</p>
                    <a href="#" class="text-blue-600 hover:text-blue-700 text-sm font-semibold">Contact Support</a>
                </div>
            </div>

            <!-- Footer -->
            <div class="text-center mt-8">
                <p class="text-slate-600 text-sm">
                    © Kizuka. All rights reserved.
                </p>
            </div>
        </div>
    </div>
</body>
</html>
