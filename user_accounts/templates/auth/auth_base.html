<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.0/dist/full.min.css" rel="stylesheet" type="text/css" />
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100">
    <div class="min-h-screen flex flex-col">

        <!-- Main Content -->
        <main class="flex-1 flex items-center justify-center px-4 py-8">
            <div class="w-full max-w-md md:max-w-lg lg:max-w-2xl">
                <div class="bg-white rounded-lg shadow-lg p-8 border border-slate-200">
                    {% block content %}{% endblock %}
                </div>
            </div>
        </main>

        {% block page_scripts %}{% endblock %}

        <!-- Footer -->
        <footer class="bg-white border-t border-slate-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 text-center text-sm text-slate-600">
                <p>&copy; 2024 FinTech Platform. All rights reserved.</p>
            </div>
        </footer>
    </div>
</body>
</html>
